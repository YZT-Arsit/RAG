retrieval_results_jsonl: artifacts/smoke/reports/context/processed_contexts.jsonl
output_jsonl: artifacts/smoke/reports/generation/grounded_answers_llm.jsonl
report_path: artifacts/smoke/reports/generation/generation_report_llm.md
method: llm
context_source: processed
max_contexts: 3
max_answer_sentences: 3
max_citation_chars: 160
max_prompt_context_chars: 300
min_hit_score: 0.0
llm_backend: local_transformers
llm_model_name: glm-edge-1.5b-chat
llm_modelscope_model_id: ZhipuAI/glm-edge-1.5b-chat
llm_use_modelscope_download: true
llm_device: auto
llm_temperature: 0.0
llm_timeout_seconds: 60
llm_max_new_tokens: 256
llm_prompt_version: v1
llm_require_context_ids: true
llm_abstain_when_insufficient: true
